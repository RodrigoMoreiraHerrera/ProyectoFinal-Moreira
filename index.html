<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <title>Divisor de gastos</title>
</head>
<body>
    <div class="container">
    <h1>DIVISOR DE GASTOS</h1>
    
    <button type="reset" class="btn btn-outline-secondary" id="btnSimular">Simular Participantes</button>

    <h2>Agregar participante</h2>
    
        <div class="input-group mb-3">
            <input type="text" class="form-control" id="nombre" placeholder="Nombre" aria-label="Nombre" aria-describedby="button-addon2">
            <button class="btn btn-outline-secondary" type="button" id="btnAgregarParticipante">Agregar</button>
            </div>

    <h2>Agregar gasto</h2>

    <form >
        <div id="infoGasto" class="input-group">
            <span class="input-group-text">Descripcion</span>
            <input type="text" aria-label="Descripcion"class="form-control" id="inputDescripcion">
            <span class="input-group-text">$</span>
            <input type="text" aria-label="Monto"class="form-control" id="inputMonto">
        </div>
        <div>
        <ul id="personasGasto" class="list-group">

        </ul>
        </div>
        <div id="btnsGastos">
        <button type="reset" class="btn btn-outline-secondary" id="btnAgregarGasto">Agregar</button>
        <button type="reset" class="btn btn-danger" id="btnResetear" >Resetear</button>
        </div>
    </form>

    <h2>Resultado</h2>

    <table class="table">
        <thead>
            <tr>
            
            <th scope="col">Gastos</th>
            <th scope="col">Monto</th>
            </tr>

        </thead>

        <tbody id="tablaGastos">
            
            
        </tbody>
    </table>


    <table class="table">
        <thead>
            <tr>
            
            <th scope="col">Nombre</th>
            <th scope="col">Monto</th>
            </tr>

        </thead>

        <tbody id="tablaResultado">

        </tbody>
    </table>





    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="gastoClass.js"></script>
    <script src="personaClass.js"></script>
    <script src="index.js"></script>
    
</body>
</html>
